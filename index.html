<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flappy Simple</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
text-align:center;
background:skyblue;
}

canvas{
background:#70c5ce;
display:block;
margin:auto;
}

#panel{
position:absolute;
top:10px;
left:10px;
font-size:20px;
color:white;
}

#record{
position:absolute;
top:40px;
left:10px;
font-size:18px;
color:white;
}

button{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
}

</style>
</head>

<body>

<div id="panel">
Puntos: <span id="score">0</span>
</div>

<div id="record">
Récord: <span id="best">0</span>
</div>
